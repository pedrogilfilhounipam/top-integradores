<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Pessoas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">Gestão de Pessoas</h1>
            <nav class="nav">
                <a href="cadastro.html" class="nav-link active">Cadastro</a>
                <a href="lista.html" class="nav-link">Lista</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <section class="form-section">
                <div class="section-header">
                    <h2>Cadastrar Novo Contato</h2>
                    <p class="subtitle">Preencha os dados abaixo para adicionar um novo contato ao sistema</p>
                </div>

                <form action="/pessoas" method="POST" class="form">
                    <div class="form-group">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" id="nome" name="nome" class="form-input" placeholder="Digite o nome completo" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="Digite o email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="text" id="telefone" name="telefone" class="form-input" placeholder="(XX) XXXXX-XXXX">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Cadastrar Contato</button>
                </form>
            </section>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2025 Sistema de Gestão de Pessoas. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
